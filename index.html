    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LottoForge - Lottery Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
    <main class="container">
        <header>
            <h1>LottoForge</h1>
            <p>Your Modern Lottery Number Generator</p>
        </header>
        <section class="lotto-display">
            <div id="lotto-numbers-container" class="lotto-numbers">
                <!-- Numbers will be generated here -->
            </div>
        </section>
        <section class="actions">
            <button id="generate-btn" class="btn btn-generate">Generate Numbers</button>
            <button id="copy-btn" class="btn btn-copy">Copy Numbers</button>
        </section>
        <section class="suggestions">
            <h2>Suggestions</h2>
            <form action="https://formspree.io/f/mojpdokb" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Suggestion" required></textarea>
                </div>
                <button type="submit" class="btn btn-submit">Send Suggestion</button>
            </form>
        </section>
        <section class="comments">
            <h2>Comments</h2>
            <div id="disqus_thread"></div>
            <script>
